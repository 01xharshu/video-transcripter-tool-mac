name: VideoTranscripterTool
options:
  bundleIdPrefix: com.videotranscripter
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  argmax-oss-swift:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: "0.9.0"

targets:
  VideoTranscripterTool:
    type: application
    platform: macOS
    sources:
      - path: VideoTranscripterTool
        excludes:
          - "*.entitlements"
    dependencies:
      - package: argmax-oss-swift
        product: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.videotranscripter.tool
        PRODUCT_NAME: Video Transcripter
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: VideoTranscripterTool/VideoTranscripterTool.entitlements
        INFOPLIST_FILE: VideoTranscripterTool/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
